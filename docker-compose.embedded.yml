# NyxAI Docker Compose Configuration - Embedded Database Mode
# This is a simplified configuration using SQLite and embedded vector database
# No external PostgreSQL or Redis required
#
# Usage:
#   docker-compose -f docker-compose.embedded.yml up -d
#
# To switch back to full mode with PostgreSQL:
#   docker-compose up -d

version: "3.8"

services:
  # ===========================================================================
  # NyxAI Application (Embedded Mode)
  # ===========================================================================
  nyxai:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: nyxai-app
    restart: unless-stopped
    ports:
      - "${NYXAI_PORT:-8000}:8000"
    environment:
      # Application settings
      - NYX_ENV=${ENVIRONMENT:-production}
      - NYX_DEBUG=${DEBUG:-false}
      - NYX_SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      
      # Embedded SQLite database (no PostgreSQL needed)
      - NYX_DB_URL=sqlite+aiosqlite:///app/data/nyxai.db
      - NYX_DB_ECHO=${DB_ECHO:-false}
      
      # Embedded vector database (ChromaDB)
      - NYX_VECTOR_ENABLED=true
      - NYX_VECTOR_PERSIST_DIRECTORY=/app/data/vector_db
      - NYX_VECTOR_COLLECTION_NAME=incidents
      - NYX_VECTOR_SIMILARITY_THRESHOLD=0.7
      - NYX_VECTOR_MAX_RESULTS=5
      
      # Disable Redis (use in-memory for caching)
      - NYX_REDIS_URL=${REDIS_URL:-}
      
      # LLM API Keys
      - NYX_LLM_API_KEY=${OPENAI_API_KEY:-}
      - NYX_LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - NYX_LLM_MODEL=${LLM_MODEL:-gpt-4}
      
      # Prometheus (optional, for metrics)
      - NYX_PROM_URL=${PROMETHEUS_URL:-}
      
      # Logging
      - NYX_LOG_LEVEL=${LOG_LEVEL:-INFO}
      - NYX_LOG_FORMAT=${LOG_FORMAT:-json}
      
    volumes:
      # Persist SQLite database and vector store
      - nyxai_data:/app/data
      - nyxai_logs:/app/logs
    networks:
      - nyxai_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ===========================================================================
  # Optional: Prometheus (for metrics collection)
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: nyxai-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./deployments/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - nyxai_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ===========================================================================
  # Optional: Grafana (for visualization)
  # ===========================================================================
  grafana:
    image: grafana/grafana:10.2.3
    container_name: nyxai-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployments/docker/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - nyxai_network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

# =============================================================================
# Networks
# =============================================================================
networks:
  nyxai_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# =============================================================================
# Volumes
# =============================================================================
volumes:
  nyxai_data:
    driver: local
  nyxai_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
