apiVersion: v1
kind: Secret
metadata:
  name: nyxai-secrets
  namespace: nyxai
  labels:
    app.kubernetes.io/name: nyxai
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Database password (change in production!)
  DB_PASSWORD: "nyxai_secure_password"

  # Secret key for JWT (change in production!)
  SECRET_KEY: "your-secret-key-change-this-in-production"

  # API Keys (optional)
  # OPENAI_API_KEY: ""
  # ANTHROPIC_API_KEY: ""

  # Grafana credentials (if using)
  # GRAFANA_ADMIN_PASSWORD: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: nyxai
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  POSTGRES_USER: "nyxai"
  POSTGRES_PASSWORD: "nyxai_secure_password"
  POSTGRES_DB: "nyxai"
