apiVersion: v1
kind: ConfigMap
metadata:
  name: nyxai-config
  namespace: nyxai
  labels:
    app.kubernetes.io/name: nyxai
    app.kubernetes.io/component: config
data:
  # Application settings
  APP_NAME: "NyxAI"
  APP_VERSION: "0.1.0"
  DEBUG: "false"
  LOG_LEVEL: "INFO"

  # API settings
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_WORKERS: "4"

  # Database settings
  DATABASE_URL: "postgresql://nyxai:${DB_PASSWORD}@postgres:5432/nyxai"
  DB_POOL_SIZE: "10"
  DB_MAX_OVERFLOW: "20"

  # Redis settings
  REDIS_URL: "redis://redis:6379/0"
  REDIS_POOL_SIZE: "10"

  # Prometheus settings
  PROMETHEUS_URL: "http://prometheus:9090"
  PROMETHEUS_TIMEOUT: "30"

  # Loki settings
  LOKI_URL: "http://loki:3100"
  LOKI_TIMEOUT: "30"

  # Detection settings
  DETECTION_ENABLED: "true"
  DETECTION_INTERVAL: "60"
  MIN_ANOMALY_SCORE: "0.7"

  # Recovery settings
  RECOVERY_ENABLED: "true"
  AUTO_RECOVERY: "false"
  RECOVERY_DRY_RUN: "true"

  # LLM settings
  LLM_ENABLED: "false"
  LLM_PROVIDER: "openai"
  LLM_MODEL: "gpt-4"

  # Agent settings
  AGENT_ENABLED: "true"
  AGENT_INTERVAL: "60"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nyxai-prometheus-config
  namespace: nyxai
  labels:
    app.kubernetes.io/name: nyxai
    app.kubernetes.io/component: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'nyxai'
        static_configs:
          - targets: ['nyxai:8000']
        metrics_path: /metrics
        scrape_interval: 15s
