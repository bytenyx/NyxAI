apiVersion: v1
kind: Service
metadata:
  name: nyxai
  namespace: nyxai
  labels:
    app.kubernetes.io/name: nyxai
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: nyxai
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: Service
metadata:
  name: nyxai-headless
  namespace: nyxai
  labels:
    app.kubernetes.io/name: nyxai
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: nyxai
    app.kubernetes.io/component: api
