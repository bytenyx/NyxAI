apiVersion: v1
kind: ServiceAccount
metadata:
  name: nyxai
  namespace: nyxai
  labels:
    app.kubernetes.io/name: nyxai
    app.kubernetes.io/component: rbac
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nyxai
  namespace: nyxai
  labels:
    app.kubernetes.io/name: nyxai
    app.kubernetes.io/component: rbac
rules:
  # Allow reading configmaps and secrets
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  # Allow reading pod information
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Allow reading service information
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nyxai
  namespace: nyxai
  labels:
    app.kubernetes.io/name: nyxai
    app.kubernetes.io/component: rbac
subjects:
  - kind: ServiceAccount
    name: nyxai
    namespace: nyxai
roleRef:
  kind: Role
  name: nyxai
  apiGroup: rbac.authorization.k8s.io
