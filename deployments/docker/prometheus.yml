# NyxAI Prometheus Configuration
# Global configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: nyxai
    replica: '{{.ExternalURL}}'

# Alertmanager configuration (optional, for future use)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files (optional, for future use)
rule_files: []

# Scrape configurations
scrape_configs:
  # ===========================================================================
  # Prometheus Self-Monitoring
  # ===========================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # ===========================================================================
  # NyxAI Application Metrics
  # ===========================================================================
  - job_name: 'nyxai'
    static_configs:
      - targets: ['nyxai:8000']
        labels:
          service: 'nyxai-app'
          environment: 'production'
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    health_check: true

  # ===========================================================================
  # NyxAI Application Health Endpoint
  # ===========================================================================
  - job_name: 'nyxai-health'
    static_configs:
      - targets: ['nyxai:8000']
    metrics_path: /health
    scrape_interval: 30s
    scrape_timeout: 5s

  # ===========================================================================
  # PostgreSQL Metrics (via postgres_exporter if available)
  # ===========================================================================
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s
    # Note: Requires postgres_exporter sidecar
    # For now, we rely on application-level DB metrics

  # ===========================================================================
  # Redis Metrics (via redis_exporter if available)
  # ===========================================================================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s
    # Note: Requires redis_exporter sidecar
    # For now, we rely on application-level Redis metrics

  # ===========================================================================
  # Celery Worker Metrics
  # ===========================================================================
  - job_name: 'celery-worker'
    static_configs:
      - targets: ['celery-worker:8000']
        labels:
          service: 'celery-worker'
          environment: 'production'
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  # ===========================================================================
  # Node Exporter (System Metrics) - Optional
  # ===========================================================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s
    scrape_timeout: 10s
    # Note: Requires node-exporter container

  # ===========================================================================
  # Docker Daemon Metrics - Optional
  # ===========================================================================
  - job_name: 'docker'
    static_configs:
      - targets: ['host.docker.internal:9323']
    scrape_interval: 30s
    scrape_timeout: 10s
    # Note: Requires Docker daemon metrics enabled
    # Add to /etc/docker/daemon.json: {"metrics-addr": "0.0.0.0:9323"}

  # ===========================================================================
  # Loki Metrics
  # ===========================================================================
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  # ===========================================================================
  # Grafana Metrics
  # ===========================================================================
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  # ===========================================================================
  # Cadvisor (Container Metrics) - Optional
  # ===========================================================================
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 30s
    scrape_timeout: 10s
    # Note: Requires cadvisor container

# Storage configuration
storage:
  tsdb:
    retention.time: 15d
    retention.size: 10GB
    wal-compression: true

# Remote write configuration (optional, for cloud storage)
# remote_write:
#   - url: "https://your-remote-endpoint/api/v1/write"
#     bearer_token: "your-token"

# Remote read configuration (optional)
# remote_read:
#   - url: "https://your-remote-endpoint/api/v1/read"
