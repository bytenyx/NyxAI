# NyxAI Promtail Configuration
# Promtail - Log Collector for Loki

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s
    backoff_config:
      min_period: 100ms
      max_period: 5s
      max_retries: 10

scrape_configs:
  # ===========================================================================
  # Docker Container Logs
  # ===========================================================================
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - json:
          expressions:
            tag:
          source: attrs
      - regex:
          expression: (?P<container_name>(?:[^|])*[^|])
          source: tag
      - timestamp:
          format: RFC3339Nano
          source: time
      - labels:
          stream:
          container_name:
      - output:
          source: output

  # ===========================================================================
  # NyxAI Application Logs
  # ===========================================================================
  - job_name: nyxai
    static_configs:
      - targets:
          - localhost
        labels:
          job: nyxai
          app: nyxai
          __path__: /var/log/nyxai/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            timestamp: timestamp
            service: service
            trace_id: trace_id
            span_id: span_id
      - labels:
          level:
          service:
      - timestamp:
          source: timestamp
          format: RFC3339
      - output:
          source: message

  # ===========================================================================
  # System Logs
  # ===========================================================================
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/syslog
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2})\s+(?P<hostname>\S+)\s+(?P<service>\S+):\s+(?P<message>.*)$'
      - labels:
          service:
          hostname:
      - timestamp:
          source: timestamp
          format: "Jan _2 15:04:05"
      - output:
          source: message

  # ===========================================================================
  # PostgreSQL Logs
  # ===========================================================================
  - job_name: postgres
    static_configs:
      - targets:
          - localhost
        labels:
          job: postgres
          __path__: /var/log/postgresql/*.log
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}\.\d+\s+\w+)\s+(?P<level>\w+):\s+(?P<message>.*)$'
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: "2006-01-02 15:04:05.000 MST"
      - output:
          source: message

  # ===========================================================================
  # Redis Logs
  # ===========================================================================
  - job_name: redis
    static_configs:
      - targets:
          - localhost
        labels:
          job: redis
          __path__: /var/log/redis/*.log
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d+:\w+\s+\d+\s+\d{2}:\d{2}:\d{2}\.\d+)\s+(?P<level>\w+)\s+(?P<message>.*)$'
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: "15:04:05.000"
      - output:
          source: message

  # ===========================================================================
  # Celery Worker Logs
  # ===========================================================================
  - job_name: celery
    static_configs:
      - targets:
          - localhost
        labels:
          job: celery
          __path__: /var/log/celery/*.log
    pipeline_stages:
      - multiline:
          firstline: '^\[\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2},\d{3}:\s+\w+/\w+\]'
      - regex:
          expression: '^\[(?P<timestamp>\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2},\d{3}):\s+(?P<level>\w+)/(?P<component>\w+)\]\s+(?P<message>.*)$'
      - labels:
          level:
          component:
      - timestamp:
          source: timestamp
          format: "2006-01-02 15:04:05,000"
      - output:
          source: message
