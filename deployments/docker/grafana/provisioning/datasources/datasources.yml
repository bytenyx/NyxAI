# NyxAI Grafana Datasources Configuration
# This file provisions datasources automatically when Grafana starts

apiVersion: 1

datasources:
  # ===========================================================================
  # Prometheus - Metrics
  # ===========================================================================
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: 2.48.0
      cacheLevel: 'High'
      incrementalQuerying: true
      incrementalQueryOverlapWindow: 10m
      queryTimeout: 60s
      timeInterval: 15s
    secureJsonData: {}

  # ===========================================================================
  # Loki - Logs
  # ===========================================================================
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id":"([^"]+)"'
          url: '$${__value.raw}'
          datasourceUid: tempo
        - name: SpanID
          matcherRegex: '"span_id":"([^"]+)"'
          url: '$${__value.raw}'

  # ===========================================================================
  # PostgreSQL - Application Database
  # ===========================================================================
  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: nyxai
    user: nyxai
    editable: false
    jsonData:
      sslmode: disable
      maxOpenConns: 100
      maxIdleConns: 100
      maxIdleConnsAuto: true
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: false
    secureJsonData:
      password: nyxai_secret_password

  # ===========================================================================
  # Redis - Cache & Queue Metrics (via Redis Data Source plugin)
  # ===========================================================================
  - name: Redis
    type: redis-datasource
    access: proxy
    url: redis://redis:6379
    editable: false
    jsonData:
      client: standalone
      poolSize: 5
      timeout: 10
      pingInterval: 0
      pipelineWindow: 0

  # ===========================================================================
  # Jaeger/Tempo - Tracing (optional, for future use)
  # ===========================================================================
  # - name: Tempo
  #   type: tempo
  #   access: proxy
  #   url: http://tempo:3200
  #   editable: false
  #   jsonData:
  #     tracesToLogs:
  #       datasourceUid: 'loki'
  #       tags: ['pod', 'namespace']
  #       mappedTags: [{ key: 'service.name', value: 'service' }]
  #       mapTagNamesEnabled: false
  #       spanStartTimeShift: '1h'
  #       spanEndTimeShift: '1h'
  #       filterByTraceID: false
  #       filterBySpanID: false
  #     tracesToMetrics:
  #       datasourceUid: 'prometheus'
  #       tags: [{ key: 'service.name', value: 'service' }, { key: 'job' }]
  #     serviceMap:
  #       datasourceUid: 'prometheus'
  #     search:
  #       hide: false
  #     nodeGraph:
  #       enabled: true
  #     lokiSearch:
  #       datasourceUid: 'loki'

